name: 更新 README 统计数据

on:
  workflow_dispatch:
  schedule:
    # 每天 23:59 北京时间 (UTC+8 → 15:59 UTC)
    - cron: '59 15 * * *'

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 检出代码仓库
      - name: 检出代码仓库
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0  # 获取完整历史以便更好的 git log 分析

      # 设置 Python
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 确定目标用户和提交作者
      - name: 确定目标用户和提交作者
        id: determine-users
        run: |
          echo "🔍 正在确定统计目标和提交作者..."

          # 通过查询 GitHub API 检查是否为 Fork 仓库
          REPO_INFO=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}")

          IS_FORK=$(echo "$REPO_INFO" | jq -r '.fork // false')

          if [ "$IS_FORK" = "true" ]; then
            # 这是 Fork 仓库
            ORIGIN_USERNAME="${{ github.repository_owner }}"
            UPSTREAM_USERNAME=$(echo "$REPO_INFO" | jq -r '.parent.owner.login // .source.owner.login // empty')

            if [ -n "$UPSTREAM_USERNAME" ] && [ "$UPSTREAM_USERNAME" != "null" ]; then
              echo "🍴 检测到 Fork 仓库"
              echo "👤 远端用户名: $ORIGIN_USERNAME"
              echo "👑 上游用户名: $UPSTREAM_USERNAME"
            else
              UPSTREAM_USERNAME="$ORIGIN_USERNAME"
              echo "🍴 Fork 仓库但无法获取上游信息"
              echo "👤 远端用户名: $ORIGIN_USERNAME"
              echo "👑 上游用户名: $UPSTREAM_USERNAME"
            fi
          else
            # 这是原始仓库
            ORIGIN_USERNAME="${{ github.repository_owner }}"
            UPSTREAM_USERNAME="${{ github.repository_owner }}"
            echo "📦 检测到原始仓库"
            echo "👤 远端用户名: $ORIGIN_USERNAME"
            echo "👑 上游用户名: $UPSTREAM_USERNAME"
          fi

          echo "ORIGIN_USERNAME=$ORIGIN_USERNAME" >> $GITHUB_OUTPUT
          echo "UPSTREAM_USERNAME=$UPSTREAM_USERNAME" >> $GITHUB_OUTPUT
          echo "✅ 用户已确定"

          # 根据触发类型确定提交作者
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发，带上触发者
            echo "👆 检测到手动触发"
            TRIGGER_USER="${{ github.triggering_actor }}"

            USER_INFO=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/users/$TRIGGER_USER")
            USER_ID=$(echo "$USER_INFO" | jq -r '.id // null')

            if [ -n "$USER_ID" ] && [ "$USER_ID" != "null" ]; then
              PRIVACY_EMAIL="$USER_ID+$TRIGGER_USER@users.noreply.github.com"
            else
              PRIVACY_EMAIL="$TRIGGER_USER@users.noreply.github.com"
            fi

            echo "co_authors=Co-authored-by: $TRIGGER_USER <$PRIVACY_EMAIL>" >> $GITHUB_OUTPUT
            echo "👤 作者: GitHub Actions + $TRIGGER_USER"
          else
            # 定时任务或 Push，只有 GitHub Actions
            echo "co_authors=" >> $GITHUB_OUTPUT
            echo "🤖 作者: GitHub Actions"
          fi

          echo "trigger_type=${{ github.event_name }}" >> $GITHUB_OUTPUT

      # 生成统计数据
      - name: 生成统计数据
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORIGIN_USERNAME: ${{ steps.determine-users.outputs.ORIGIN_USERNAME }}
          UPSTREAM_USERNAME: ${{ steps.determine-users.outputs.UPSTREAM_USERNAME }}
        run: |
          echo "🚀 开始生成统计数据..."
          echo "👤 目标用户: $ORIGIN_USERNAME"
          echo "📊 仓库: ${{ github.repository }}"

          # 验证环境变量
          if [ -z "$GH_TOKEN" ]; then
            echo "❌ 错误: GH_TOKEN 未设置"
            exit 1
          fi

          if [ -z "$ORIGIN_USERNAME" ]; then
            echo "❌ 错误: ORIGIN_USERNAME 未设置"
            exit 1
          fi

          # 运行脚本，带超时和错误处理
          timeout 25m python3 scripts/generate-stats.py --mode actions || {
            echo "❌ 统计生成失败或超时"
            echo "📋 检查部分结果..."
            if [ -f "README.md" ]; then
              echo "✅ README.md 存在，检查更改..."
              git diff --name-only
            fi
            exit 1
          }

          echo "✅ 统计数据生成成功"

      # 检查是否有更改
      - name: 检查是否有更改
        id: check-changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  未检测到更改"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📝 检测到更改:"
            git diff --name-only
          fi

      # 提交并推送
      - name: 提交并推送
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          echo "📤 正在提交和推送更改..."

          # 配置 git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 添加更改
          git add README.md config.toml contributions.svg scripts/stats_cache/

          # 创建提交
          if [ -n "${{ steps.determine-users.outputs.co_authors }}" ]; then
            git commit \
              -m "📊 更新统计（自动）" \
              -m "${{ steps.determine-users.outputs.co_authors }}"
          else
            git commit -m "📊 更新统计（自动）"
          fi

          # 推送更改
          if git push; then
            echo "✅ 更改推送成功"
          else
            echo "❌ 推送更改失败"
            exit 1
          fi

      # 摘要
      - name: 摘要
        if: always()
        run: |
          echo "📋 工作流摘要:"
          echo "- 仓库: ${{ github.repository }}"
          echo "- 触发方式: ${{ github.event_name }}"
          echo "- 远端用户名: ${{ steps.determine-users.outputs.ORIGIN_USERNAME }}"
          echo "- 上游用户名: ${{ steps.determine-users.outputs.UPSTREAM_USERNAME }}"
          echo "- 是否有更改: ${{ steps.check-changes.outputs.changes || 'unknown' }}"
